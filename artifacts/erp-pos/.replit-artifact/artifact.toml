kind = "web"
previewPath = "/"
title = "Electronics ERP & POS"
version = "1.0.0"
id = "artifacts/erp-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22432

[services.development]
run = "pnpm --filter @workspace/erp-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/erp-pos", "run", "build" ]
publicDir = "artifacts/erp-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22432"
BASE_PATH = "/"
